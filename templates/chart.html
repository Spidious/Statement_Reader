<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Summary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.4rem;
      color: #222;
      margin-bottom: 1.5rem;
    }

    .chart-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 1.5rem;
      width: 100%;
      max-width: 800px;
    }

    .back-link {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #4f46e5;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Expense Summary</h1>
  <div class="chart-wrapper">
    {{ chart_html | safe }}
  </div>
  <a class="back-link" href="/">&#8592; Start over</a>
</body>
</html>
