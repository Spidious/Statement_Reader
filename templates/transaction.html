<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Transactions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
    }

    .progress {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 1.5rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .progress-bar-track {
      background: #e8e8e8;
      border-radius: 4px;
      height: 4px;
      margin-top: 0.4rem;
    }

    .progress-bar-fill {
      background: #4f46e5;
      border-radius: 4px;
      height: 4px;
      width: {{ ((idx + 1) / total * 100) | int }}%;
      transition: width 0.3s ease;
    }

    .description {
      font-size: 1rem;
      color: #333;
      margin-bottom: 0.4rem;
      word-break: break-word;
    }

    .date {
      font-size: 0.82rem;
      color: #999;
      margin-bottom: 1.8rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid #d4d4d4;
      border-radius: 8px;
      font-size: 1rem;
      color: #222;
      background: #fafafa;
      transition: border-color 0.2s;
      margin-bottom: 1.4rem;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #4f46e5;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-secondary {
      background: #f0f0f0;
      color: #444;
    }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }

    .btn-success {
      background: #16a34a;
      color: #fff;
    }

    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <p class="progress">
      Transaction {{ idx + 1 }} of {{ total }}
      <span class="progress-bar-track"><span class="progress-bar-fill"></span></span>
    </p>

    <p class="description">{{ t.description | title }}</p>
    <p class="date">{{ t.date }}</p>

    <form method="POST">
      <label for="amount">Amount</label>
      <input type="text" id="amount" name="amount" value="{{ amount }}">

      <label for="category">Category <span style="font-weight:400;color:#aaa">(optional)</span></label>
      <select id="category" name="category">
        <option value="">— none —</option>
        {% for cat in categories %}
        <option value="{{ cat }}" {% if cat == selected_category %}selected{% endif %}>
          {{ cat | capitalize }}
        </option>
        {% endfor %}
      </select>

      <div class="actions">
        {% if idx > 0 %}
        <button class="btn btn-secondary" type="submit" name="action" value="back">&#8592; Back</button>
        {% endif %}
        <button class="btn btn-primary" type="submit" name="action" value="next">
          {% if idx + 1 == total %}Done{% else %}Next &#8594;{% endif %}
        </button>
        <button class="btn btn-success" type="submit" name="action" value="finish">Finish</button>
      </div>
    </form>
  </div>
</body>
</html>
